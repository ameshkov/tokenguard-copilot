name: CI

on:
  push:
    tags: ['v*']
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  actions: write

# Cancel superseded runs on PRs (never on tag pushes, which drive releases).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Lint, Unit Tests & Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build with Dockerfile.ci
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.ci
          outputs: type=local,dest=./ci-output
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix
          path: ci-output/*.vsix

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build with Dockerfile.e2e
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.e2e
          outputs: type=local,dest=./e2e-output
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    needs: [ci, e2e-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: dist/
      - uses: softprops/action-gh-release@v2
        with:
          body: See [CHANGELOG.md](./CHANGELOG.md) for the list
            of changes.
          draft: false
          prerelease: false
          files: dist/*.vsix

  publish-marketplace:
    name: Publish to Marketplace
    needs: [ci, e2e-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: dist/
      - run: pnpm vsce publish --no-dependencies --allow-all-proposed-apis --packagePath dist/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  publish-openvsx:
    name: Publish to Open VSX
    needs: [ci, e2e-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: dist/
      - run: pnpm ovsx publish dist/*.vsix -p ${{ secrets.OPEN_VSX_TOKEN }}
